<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Notes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📝 Aplikasi Notes</h1>

    <div class="form-box">
      <input type="hidden" id="editId">
      <input type="text" id="judul" placeholder="Judul catatan..." required>
      <textarea id="isi" placeholder="Isi catatan..." rows="4"></textarea>
      <div class="btn-group">
        <button onclick="saveNote()">💾 Simpan</button>
        <button onclick="cancelEdit()" id="btnCancel" style="display:none">✖ Batal</button>
      </div>
    </div>

    <div id="notesList"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
